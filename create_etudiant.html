
<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style4.css">
    </head>
    <body>
        <title>Etudiant</title>        
        <h1 align="center">Inscription d'un nouvel étudiant</h1>
            <div class="container-lg align-items-md-center">
            <form class="student">
                <label for="nom" class="form-label">Nom</label>
                <input type="text" id="nom" class="form-control">
                <br>
                <label for="prenom" class="form-label">Prénom</label>
                <input type="text" id="prenom" class="form-control">
                <br>
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control">
                <br>
            </form>
            <button type="button" class="btn btn-primary" onclick="returnToIndex()">
                Retour
            </button>
            <button type="button" class="btn btn-danger" onclick="createEtudiant()">
                Enregistrer
            </button>
        </div>
        <script>
            function returnToIndex() {
                window.open('./index.html', '_self');
            }

            function createEtudiant() {
                var json = {};
                json["nom"] = document.getElementById("nom").value;
                json["prenom"] = document.getElementById("prenom").value;
                json["email"] = document.getElementById("email").value;

                var req = new XMLHttpRequest();
                var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php';
                req.open("POST", url_api, true); 
                req.setRequestHeader('Content-Type', 'application/json');
                req.send(JSON.stringify(json));
                req.onload = function () {
                    var json = JSON.parse(req.responseText);
                    console.log(json);
                    window.open('./index.html', '_self');
                };
            }
        </script>
    </body>
</html>
