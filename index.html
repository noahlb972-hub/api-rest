<!DOCTYPE html>
        <head>
            <meta charset="utf-8">
            <link rel="stylesheet" href="style5.css">
        </head>
        <body> 
      <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableau">
                <script>
                // GET REQUEST
                document.addEventListener("DOMContentLoaded", function () {

                    var req;
                    req = new XMLHttpRequest();

                    req.open(
                        "GET",
                        "http://192.168.1.224/ciel2027/api/etudiants",
                        true
                    );
                    
                    req.send();
                    

                    req.onload = function () {

                        var json = JSON.parse(req.responseText);
                        var html = "";

                        // loop and display data
                        json.forEach(function (val) {

                            html += "<tr>";
                            html += "<td>" + "<a href=./update_etudiant.html?id=" + val['id'] + ">" + val['nom'] + "</a>" + "</td>";
                            html += "<td>" + val["prenom"] + "</td>";
                            html += "<td>" + val["email"] + "</td>";
                            html += "</tr>";

                        });

                        // append in tbody
                        document.getElementById("tableau").innerHTML = html;
                    };

                });
                </script>
            </tbody>
        </table>
        <button type="button" class="btn btn-success" onclick="window.location.href = 'create_etudiant.html';">
            Inscrire un étudiant
        </button>
    </body>
</html>
